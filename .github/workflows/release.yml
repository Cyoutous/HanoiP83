name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: hanoip83-windows-x64
          - os: ubuntu-latest
            artifact: hanoip83-linux-x64
          - os: macos-latest
            artifact: hanoip83-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Conan
        run: pip install "conan>=2.0"

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo rm -f /var/lib/apt/lists/lock /var/cache/apt/archives/lock /var/lib/dpkg/lock*
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libx11-xcb-dev libfontenc-dev \
            libice-dev libsm-dev libxau-dev libxaw7-dev libxcomposite-dev libxdamage-dev \
            libxkbfile-dev libxmu-dev libxmuu-dev libxpm-dev libxres-dev libxss-dev \
            libxt-dev libxtst-dev libxv-dev libxxf86vm-dev libxcb-glx0-dev libxcb-render0-dev \
            libxcb-render-util0-dev libxcb-xkb-dev libxcb-icccm4-dev libxcb-image0-dev \
            libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev libxcb-sync-dev \
            libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-dri3-dev uuid-dev \
            libxcb-cursor-dev libxcb-dri2-0-dev libxcb-present-dev libxcb-composite0-dev \
            libxcb-ewmh-dev libxcb-res0-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxi-dev libasound2-dev libxcb-util-dev libxcb-util0-dev

      - name: Conan install
        run: conan install . --output-folder=. --build=missing -s build_type=Release -s compiler.cppstd=17

      - name: CMake configure
        shell: bash
        run: |
          TC=""
          if [ -f build/build/generators/conan_toolchain.cmake ]; then
            TC="build/build/generators/conan_toolchain.cmake"
            BUILD_DIR="build/build"
          elif [ -f build/Release/generators/conan_toolchain.cmake ]; then
            TC="build/Release/generators/conan_toolchain.cmake"
            BUILD_DIR="build/Release"
          elif [ -f build/generators/conan_toolchain.cmake ]; then
            TC="build/generators/conan_toolchain.cmake"
            BUILD_DIR="build"
          else
            echo "ERROR: conan_toolchain.cmake not found"
            find build -name conan_toolchain.cmake 2>/dev/null || true
            exit 1
          fi
          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV
          cmake -B "$BUILD_DIR" -DCMAKE_TOOLCHAIN_FILE="$TC" -DCMAKE_BUILD_TYPE=Release

      - name: CMake build
        run: cmake --build ${{ env.BUILD_DIR }} --config Release

      - name: Prepare dist
        shell: bash
        run: |
          SRC="${{ env.BUILD_DIR }}"
          if [ -d "$SRC/Release" ]; then SRC="$SRC/Release"; fi

          mkdir -p dist

          # --- 复制可执行文件 ---
          if [ -f "$SRC/hanoip83.exe" ]; then
            cp "$SRC/hanoip83.exe" dist/
            # Windows：复制所有 DLL（raylib.dll 等）
            cp "$SRC/"*.dll dist/ 2>/dev/null || true
          elif [ -f "$SRC/hanoip83" ]; then
            cp "$SRC/hanoip83" dist/
            # Linux / macOS：复制可能的运行时库
            cp "$SRC/"*.so dist/ 2>/dev/null || true
            cp "$SRC/"*.dylib dist/ 2>/dev/null || true
          fi

          # --- 复制 assets ---
          cp -r assets dist/

          # --- 验证 ---
          echo "dist contents:"
          find dist -type f | sort

      - name: Create ZIP (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: powershell Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Create ZIP (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cd dist && zip -r ../${{ matrix.artifact }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      - name: Clean old release assets (keep only .zip)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"

          # 获取 release ID
          RELEASE_ID=$(curl -sS -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG" | jq -r '.id')

          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "No existing release found for tag $TAG, skipping cleanup"
            exit 0
          fi

          echo "Release ID: $RELEASE_ID"

          # 删除所有非 .zip 的资产（PNG、裸 exe、LICENSE 等旧版 broken workflow 遗留文件）
          curl -sS -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/$RELEASE_ID/assets" | \
            jq -r '.[] | select(.name | test("\\.zip$") | not) | "\(.id) \(.name)"' | \
            while read asset_id asset_name; do
              echo "Deleting old asset: $asset_name (id=$asset_id)"
              curl -sS -X DELETE -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/$REPO/releases/assets/$asset_id"
            done

          echo "Cleanup done"

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
