name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: hanoip83-windows-x64
          - os: ubuntu-latest
            artifact: hanoip83-linux-x64
          - os: macos-latest
            artifact: hanoip83-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Conan
        run: pip install "conan>=2.0"

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo killall apt-get apt 2>/dev/null || true
          while sudo fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do sleep 2; done
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev

      - name: Conan install
        run: conan install . --output-folder=. --build=missing -s build_type=Release -c tools.system.package_manager:mode=install

      - name: CMake configure
        run: cmake --preset conan-default

      - name: CMake build
        run: cmake --build build --config Release

      - name: Package ZIP
        shell: bash
        run: |
          # MSVC puts binary & assets under build/Release/, others under build/
          if [ -d "build/Release" ]; then
            BIN_DIR="build/Release"
          else
            BIN_DIR="build"
          fi
          cd "$BIN_DIR"
          zip -r ../../${{ matrix.artifact }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
