name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: hanoip83-windows-x64
          - os: ubuntu-latest
            artifact: hanoip83-linux-x64
          - os: macos-latest
            artifact: hanoip83-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Conan
        run: pip install "conan>=2.0"

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo rm -f /var/lib/apt/lists/lock /var/cache/apt/archives/lock /var/lib/dpkg/lock*
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libx11-xcb-dev libfontenc-dev \
            libice-dev libsm-dev libxau-dev libxaw7-dev libxcomposite-dev libxdamage-dev \
            libxkbfile-dev libxmu-dev libxmuu-dev libxpm-dev libxres-dev libxss-dev \
            libxt-dev libxtst-dev libxv-dev libxxf86vm-dev libxcb-glx0-dev libxcb-render0-dev \
            libxcb-render-util0-dev libxcb-xkb-dev libxcb-icccm4-dev libxcb-image0-dev \
            libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev libxcb-sync-dev \
            libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-dri3-dev uuid-dev \
            libxcb-cursor-dev libxcb-dri2-0-dev libxcb-present-dev libxcb-composite0-dev \
            libxcb-ewmh-dev libxcb-res0-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxi-dev libasound2-dev libxcb-util-dev libxcb-util0-dev

      - name: Conan install
        run: conan install . --output-folder=. --build=missing -s build_type=Release -s compiler.cppstd=17

      - name: CMake configure
        shell: bash
        run: |
          TC=""
          if [ -f build/build/generators/conan_toolchain.cmake ]; then
            TC="build/build/generators/conan_toolchain.cmake"
            BUILD_DIR="build/build"
          elif [ -f build/Release/generators/conan_toolchain.cmake ]; then
            TC="build/Release/generators/conan_toolchain.cmake"
            BUILD_DIR="build/Release"
          elif [ -f build/generators/conan_toolchain.cmake ]; then
            TC="build/generators/conan_toolchain.cmake"
            BUILD_DIR="build"
          else
            echo "ERROR: conan_toolchain.cmake not found"
            find build -name conan_toolchain.cmake 2>/dev/null || true
            exit 1
          fi
          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV
          cmake -B "$BUILD_DIR" -DCMAKE_TOOLCHAIN_FILE="$TC" -DCMAKE_BUILD_TYPE=Release

      - name: CMake build
        run: cmake --build ${{ env.BUILD_DIR }} --config Release

      - name: Prepare dist
        shell: bash
        run: |
          SRC="${{ env.BUILD_DIR }}"
          if [ -d "$SRC/Release" ]; then SRC="$SRC/Release"; fi
          mkdir dist
          cp "$SRC"/*.exe dist/ 2>/dev/null || cp "$SRC"/*hanoip83* dist/ 2>/dev/null || true
          cp -r assets dist/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
